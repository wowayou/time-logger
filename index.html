<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="时间尺">
  <meta name="theme-color" content="#0d0d14" id="meta-theme-color">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
  <title>时间尺</title>
  <style>
    /* === 暗色（默认）=== */
    :root {
      --bg: #0d0d14;
      --card: #1a1a28;
      --input: #242438;
      --border: #2d2d46;
      --track: #2d2d46;
      --accent: #7c6cfa;
      --accent-bg: rgba(124,108,250,0.12);
      --green: #4fa87a;
      --green-bg: rgba(79,168,122,0.12);
      --text: #e0e0ef;
      --muted: #7878a0;
      --danger: #e05c6c;
      --control-h: 44px;
      --icon-btn: 36px;
    }
    /* === 亮色（跟随系统）=== */
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7fa;
        --card: #ffffff;
        --input: #eef0f4;
        --border: #d8dae2;
        --track: #c9ccd6;
        --accent: #6c5cf0;
        --accent-bg: rgba(108,92,240,0.12);
        --green: #3e9e72;
        --green-bg: rgba(62,158,114,0.12);
        --text: #1c1c28;
        --muted: #6b6b85;
        --danger: #d6485a;
      }
    }
    /* === 手动覆盖（优先级高于 media query）=== */
    html[data-theme="light"] {
      --bg: #f7f7fa;
      --card: #ffffff;
      --input: #eef0f4;
      --border: #d8dae2;
      --track: #c9ccd6;
      --accent: #6c5cf0;
      --accent-bg: rgba(108,92,240,0.12);
      --green: #3e9e72;
      --green-bg: rgba(62,158,114,0.12);
      --text: #1c1c28;
      --muted: #6b6b85;
      --danger: #d6485a;
    }
    html[data-theme="dark"] {
      --bg: #0d0d14;
      --card: #1a1a28;
      --input: #242438;
      --border: #2d2d46;
      --track: #2d2d46;
      --accent: #7c6cfa;
      --accent-bg: rgba(124,108,250,0.12);
      --green: #4fa87a;
      --green-bg: rgba(79,168,122,0.12);
      --text: #e0e0ef;
      --muted: #7878a0;
      --danger: #e05c6c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    button { touch-action: manipulation; }
    .app {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px calc(72px + env(safe-area-inset-bottom));
    }

    /* Header */
    .hdr {
      padding: 20px 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hdr h1 { font-size: 22px; font-weight: 700; letter-spacing: 0; }
    .hdr-date { font-size: 13px; color: var(--muted); }
    .seg {
      display: inline-flex;
      align-items: center;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px;
      gap: 2px;
      flex-shrink: 0;
    }
    .seg button {
      background: transparent;
      border: none;
      color: var(--muted);
      border-radius: 8px;
      font-size: 12px;
      line-height: 1;
      font-family: inherit;
      padding: 7px 9px;
      cursor: pointer;
      white-space: nowrap;
    }
    .seg button.active {
      background: var(--card);
      color: var(--text);
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
    }
    .theme-seg { margin-left: auto; }
    /* Add button */
    .add-btn {
      width: 100%;
      padding: 15px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
    .add-btn:active { opacity: 0.8; }
    .add-btn[hidden] { display: none; }

    /* Unified command tooltip */
    button[data-tip] { position: relative; }
    button[data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      z-index: 40;
      width: max-content;
      max-width: min(260px, calc(100vw - 32px));
      padding: 7px 9px;
      border-radius: 8px;
      background: var(--text);
      color: var(--bg);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 500;
      white-space: normal;
      text-align: left;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
      transition-delay: 0s;
    }
    button[data-tip]::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: calc(100% + 3px);
      transform: translateX(-50%);
      z-index: 41;
      border: 5px solid transparent;
      border-top-color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
      transition-delay: 0s;
    }
    button[data-tip][data-tip-pos="bottom"]::after {
      top: calc(100% + 8px);
      bottom: auto;
    }
    button[data-tip][data-tip-pos="bottom"]::before {
      top: calc(100% + 3px);
      bottom: auto;
      border-top-color: transparent;
      border-bottom-color: var(--text);
    }
    @media (hover: hover) and (pointer: fine) {
      button[data-tip]:hover::after,
      button[data-tip]:hover::before {
        opacity: 1;
        transition-delay: 800ms;
      }
    }
    button[data-tip]:focus-visible::after,
    button[data-tip]:focus-visible::before {
      opacity: 1;
      transition-delay: 0s;
    }

    /* View controls */
    .view-box {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    .view-tabs { width: 100%; }
    .view-tabs button { flex: 1; font-size: 13px; }
    .date-nav {
      display: grid;
      grid-template-columns: 42px 1fr 42px 76px;
      gap: 8px;
      align-items: center;
    }
    .nav-btn {
      height: 40px;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    .nav-btn:active { opacity: 0.75; }
    .period-label {
      min-width: 0;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 10px;
    }

    /* Form */
    .form-box {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .fl { margin-bottom: 11px; }
    .fl-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .inp {
      width: 100%;
      background: var(--input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      padding: 10px 12px;
      min-height: var(--control-h);
      line-height: 1.25;
      outline: none;
    }
    .inp:focus { border-color: var(--accent); }
    .edit-what-input { margin-bottom: 8px; }
    .edit-tag-input { margin-bottom: 10px; }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 7px; }
    .chip {
      padding: 6px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
    }
    .chip.sel {
      background: var(--accent-bg);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Form actions */
    .form-btns {
      display: flex;
      align-items: stretch;
      gap: 8px;
      min-height: var(--control-h);
      margin-top: 4px;
    }
    .btn-pri {
      flex: 1;
      min-height: var(--control-h);
      padding: 0 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-pri:active { opacity: 0.8; }
    .btn-sec {
      min-height: var(--control-h);
      min-width: 88px;
      padding: 0 16px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
    }
    .btn-pri, .btn-sec {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1.2;
    }

    /* Wheel picker */
    .wheel-picker {
      display: flex;
      height: 200px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--input);
      position: relative;
    }
    .wheel-col {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      outline: none;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 28%, black 72%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 28%, black 72%, transparent 100%);
    }
    .wheel-col::-webkit-scrollbar { display: none; }
    .wheel-col-date { flex: 1.8; }
    .wheel-item {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: center;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      padding: 0 4px;
    }
    .wheel-col-date .wheel-item { font-size: 12px; }
    .wheel-divider {
      width: 1px;
      background: var(--border);
      flex-shrink: 0;
      align-self: stretch;
    }
    .wheel-highlight {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      height: 40px;
      transform: translateY(-50%);
      border-top: 1px solid var(--accent);
      border-bottom: 1px solid var(--accent);
      background: var(--accent-bg);
      pointer-events: none;
      z-index: 1;
    }
    .wheel-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }
    .wheel-now-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      padding: 4px 0;
    }
    /* Desktop datetime picker */
    .dt-picker {
      display: grid;
      gap: 9px;
      position: relative;
    }
    .dt-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      height: var(--control-h);
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      padding: 0 12px;
      width: 100%;
      text-align: left;
      white-space: nowrap;
    }
    .dt-trigger:active { opacity: 0.75; }
    .dt-cal-ico {
      flex-shrink: 0;
      margin-left: auto;
      color: var(--muted);
      width: 16px;
      height: 16px;
    }
    .dt-pop {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      padding: 12px;
      width: 280px;
      max-width: calc(100vw - 24px);
    }
    .dt-pop.dt-pop-up {
      top: auto;
      bottom: calc(100% + 6px);
    }
    .dt-cal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .dt-nav {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 18px;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 8px;
      border-radius: 6px;
    }
    .dt-nav:hover { background: var(--input); }
    .dt-cal-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .dt-cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .dt-day {
      aspect-ratio: 1;
      background: transparent;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      color: var(--text);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dt-day:hover:not(:disabled) { background: var(--input); }
    .dt-day.is-today { color: var(--accent); font-weight: 600; }
    .dt-day.is-sel { background: var(--accent); color: #fff; }
    .dt-day.is-sel:hover { background: var(--accent); }
    .dt-blank { pointer-events: none; color: transparent; cursor: default; }
    .dt-time {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }
    .dt-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .dt-step-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      padding: 2px 8px;
      line-height: 1;
    }
    .dt-step-btn:hover { background: var(--input); }
    .dt-step-inp {
      width: 44px;
      text-align: center;
      font-size: 16px;
      font-family: inherit;
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 0;
      -moz-appearance: textfield;
    }
    .dt-step-inp::-webkit-outer-spin-button,
    .dt-step-inp::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .dt-colon {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      padding-bottom: 2px;
    }
    .dt-now {
      margin-left: 4px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      padding: 3px 10px;
    }
    .dt-now:hover { background: var(--accent-bg); }
    .dt-precise { display: grid; gap: 4px; }
    .dt-precise-label { font-size: 11px; color: var(--muted); }
    .dt-error {
      color: var(--danger);
      font-size: 12px;
      line-height: 1.35;
      min-height: 16px;
    }
    .dt-error[hidden] {
      display: none;
    }

    /* Ruler */
    .ruler {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .ruler-bar {
      height: 7px;
      border-radius: 4px;
      background: var(--input);
      display: flex;
      overflow: hidden;
      margin-bottom: 9px;
      gap: 1px;
    }
    .ruler-bar div { transition: flex 0.3s; }
    .ruler-text {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .ruler-text span { display: flex; align-items: center; gap: 5px; }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Timeline */
    .tl-label {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .entry {
      background: var(--card);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      border: 1px solid transparent;
    }
    .entry.editing { border-color: var(--accent); }
    .entry.sheet-editing { border-color: var(--accent); }
    .e-body { flex: 1; min-width: 0; }
    .e-time { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 2px; }
    .e-what { font-size: 15px; color: var(--text); word-break: break-word; margin-bottom: 5px; }
    .e-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .e-tag {
      font-size: 12px;
      padding: 2px 9px;
      border-radius: 10px;
      background: var(--accent-bg);
      color: var(--accent);
    }
    .e-tag-g { background: var(--green-bg); color: var(--green); }
    .e-dur { font-size: 12px; color: var(--muted); }
    .e-btns {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 0 0 var(--icon-btn);
      width: var(--icon-btn);
    }
    .icon-btn {
      width: var(--icon-btn);
      height: var(--icon-btn);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 var(--icon-btn);
      padding: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      cursor: pointer;
      border-radius: 8px;
    }
    .icon-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .icon-btn:active { background: var(--input); }
    .icon-btn.dbtn { color: var(--danger); }
    .edit-context {
      display: grid;
      gap: 2px;
      padding-bottom: 10px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .edit-actions {
      justify-content: flex-end;
      min-height: 40px;
      margin-top: 8px;
    }
    .edit-actions .icon-btn {
      width: 40px;
      height: 40px;
      flex-basis: 40px;
      border: 1px solid var(--border);
    }
    .edit-actions .save-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .edit-actions .cancel-btn {
      background: transparent;
      color: var(--muted);
    }
    .mini-btn {
      min-height: 26px;
      padding: 0 10px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent-bg);
      color: var(--accent);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    .mini-btn:active { opacity: 0.75; }
    .time-toggle {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
    }
    .time-collapse { margin-top: 8px; }
    .time-collapse[hidden] { display: none; }

    /* Update prompt */
    .update-banner {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: calc(70px + env(safe-area-inset-bottom));
      z-index: 60;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      box-shadow: 0 12px 32px rgba(0,0,0,0.28);
    }
    .update-banner[hidden] { display: none; }
    .update-banner span {
      min-width: 0;
      flex: 1;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }
    .update-btn {
      min-height: 36px;
      padding: 0 12px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Mobile edit sheet */
    .edit-sheet {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: grid;
      align-items: end;
    }
    .edit-sheet[hidden] { display: none; }
    .edit-sheet-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.42);
    }
    .edit-sheet-panel {
      position: relative;
      max-height: min(92dvh, 720px);
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      background: var(--card);
      padding: 0 16px calc(16px + env(safe-area-inset-bottom));
      box-shadow: 0 -16px 42px rgba(0,0,0,0.32);
      -webkit-overflow-scrolling: touch;
    }
    .edit-sheet-head {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 64px;
      padding: 12px 0 10px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }
    .edit-sheet-summary {
      min-width: 0;
      flex: 1;
    }
    .edit-sheet-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }
    .edit-sheet-what {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-size: 15px;
    }
    .edit-sheet-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }
    .edit-sheet-actions .icon-btn {
      width: 40px;
      height: 40px;
      flex-basis: 40px;
      border: 1px solid var(--border);
    }
    .edit-sheet-actions .save-btn {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .edit-sheet-body {
      display: grid;
      gap: 12px;
      padding-top: 14px;
    }
    body.sheet-open {
      overflow: hidden;
    }
    body.sheet-open .footer { display: none; }
    body.sheet-open .update-banner { bottom: calc(12px + env(safe-area-inset-bottom)); }

    .empty-tip {
      text-align: center;
      color: var(--muted);
      padding: 36px 0;
      font-size: 14px;
    }

    /* Summary */
    .summary-list {
      display: grid;
      gap: 8px;
    }
    .sum-row {
      width: 100%;
      background: var(--card);
      border: 1px solid transparent;
      border-radius: 12px;
      color: var(--text);
      padding: 12px 14px;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
    }
    .sum-row:active { border-color: var(--accent); }
    .sum-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }
    .sum-name { font-size: 15px; font-weight: 600; }
    .sum-total { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
    .sum-meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 420px) {
      .app { padding-left: 12px; padding-right: 12px; }
      .hdr { flex-wrap: wrap; }
      .theme-seg { margin-left: 0; width: 100%; }
      .theme-seg button { flex: 1; }
      .date-nav { grid-template-columns: 40px 1fr 40px 72px; }
      .entry { padding: 12px; gap: 8px; }
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
    }
    .footer-inner { max-width: 600px; margin: 0 auto; }
    .footer-btns { display: flex; gap: 7px; }
    .copy-btn {
      flex: 1;
      min-width: 0;
      padding: 11px 4px;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn.copied { color: var(--accent); border-color: var(--accent); }
    .copy-btn:active { opacity: 0.7; }
    .copy-btn[hidden] { display: none; }
    .copy-btn[aria-disabled="true"] {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .copy-btn[aria-disabled="true"]:active { opacity: 0.45; }
  </style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <h1>时间尺</h1>
    <span class="hdr-date" id="hdr-date"></span>
    <div class="seg theme-seg" id="theme-seg" role="group" aria-label="主题">
      <button type="button" data-action="theme" data-theme="auto" data-tip="跟随系统亮暗色设置。" data-tip-pos="bottom" aria-label="主题：自动">自动</button>
      <button type="button" data-action="theme" data-theme="light" data-tip="切换到亮色主题。" data-tip-pos="bottom" aria-label="主题：亮色">亮色</button>
      <button type="button" data-action="theme" data-theme="dark" data-tip="切换到暗色主题。" data-tip-pos="bottom" aria-label="主题：暗色">暗色</button>
    </div>
  </div>

  <div class="view-box">
    <div class="seg view-tabs" id="view-tabs" role="group" aria-label="视图">
      <button type="button" data-action="view" data-view="day" data-tip="查看单日时间轴，可编辑记录。" data-tip-pos="bottom" aria-label="天视图">天</button>
      <button type="button" data-action="view" data-view="week" data-tip="查看本周每日汇总，可下钻到某天。" data-tip-pos="bottom" aria-label="周视图">周</button>
      <button type="button" data-action="view" data-view="month" data-tip="查看本月每日汇总，可下钻到某天。" data-tip-pos="bottom" aria-label="月视图">月</button>
      <button type="button" data-action="view" data-view="year" data-tip="查看全年每月汇总，可下钻到某月。" data-tip-pos="bottom" aria-label="年视图">年</button>
    </div>
    <div class="date-nav">
      <button class="nav-btn" type="button" data-action="shift-period" data-delta="-1" aria-label="上一段" data-tip="切到上一段。">‹</button>
      <div class="period-label" id="period-label"></div>
      <button class="nav-btn" type="button" data-action="shift-period" data-delta="1" aria-label="下一段" data-tip="切到下一段。">›</button>
      <button class="nav-btn" id="today-btn" type="button" data-action="today" data-tip="回到包含今天的当前周期。" aria-label="回到今天">回到今天</button>
    </div>
  </div>

  <button class="add-btn" id="add-btn" type="button" data-action="open-form" data-tip="打开表单，记录一条新的时间去向。" aria-label="记一条新的时间记录">+ 记一条</button>

  <div class="form-box" id="form-box">
    <div class="fl">
      <div class="fl-label">时间（可改，补录用）</div>
      <input type="hidden" id="form-ts">
      <div id="form-wheel-mount"></div>
    </div>
    <div class="fl">
      <div class="fl-label">做了什么</div>
      <input type="text" class="inp" id="form-what" placeholder="写邮件 / 刷手机 / 准备面试…">
    </div>
    <div class="fl">
      <div class="fl-label">标签</div>
      <div class="chips" id="form-chips">
        <button class="chip" type="button" data-action="pick-form-tag" data-tag="求职推进" aria-label="选择标签：求职推进">求职推进</button>
        <button class="chip" type="button" data-action="pick-form-tag" data-tag="研究·学工具·逃避" aria-label="选择标签：研究、学工具、逃避">研究·学工具·逃避</button>
        <button class="chip" type="button" data-action="pick-form-tag" data-tag="未知" aria-label="选择标签：未知">未知</button>
        <button class="chip" type="button" data-action="pick-form-tag" data-tag="杂" aria-label="选择标签：杂">杂</button>
      </div>
      <input type="text" class="inp" id="form-ctag" placeholder="自定义标签（可选，留空用上面选的）">
    </div>
    <div class="form-btns">
      <button class="btn-pri" type="button" data-action="save-entry" data-tip="保存当前表单为一条记录。" aria-label="保存时间记录">记下来</button>
      <button class="btn-sec" type="button" data-action="close-form" data-tip="关闭表单，不保存这次输入。" aria-label="取消新增记录">取消</button>
    </div>
  </div>

  <div class="ruler" id="ruler">
    <p style="color:var(--muted);font-size:13px">今天还没有记录</p>
  </div>

  <div>
    <div class="tl-label" id="list-label">今日时间轴</div>
    <div id="timeline"></div>
  </div>
</div>

<div class="update-banner" id="update-banner" hidden>
  <span>发现新版。当前数据仍保存在本机。</span>
  <button class="update-btn" type="button" data-action="update-app" data-tip="刷新并加载新版应用。" aria-label="更新应用">更新应用</button>
</div>

<div class="edit-sheet" id="edit-sheet" hidden>
  <div class="edit-sheet-backdrop" data-action="cancel-edit" aria-hidden="true"></div>
  <section class="edit-sheet-panel" role="dialog" aria-modal="true" aria-labelledby="edit-sheet-title"></section>
</div>

<div class="footer">
  <div class="footer-inner">
    <div class="footer-btns">
      <button class="copy-btn" id="summary-btn" type="button" data-action="copy-summary" data-tip="复制当前视图 Markdown，包含生成时间、周期、统计比例和明细，可贴给 AI；不导出完整历史、不包含内部 id。" aria-label="复制当前视图摘要">摘要</button>
      <button class="copy-btn" id="copy-btn" type="button" data-action="copy-json" data-tip="复制完整 JSON 备份到剪贴板，包含所有本机记录。" aria-label="复制完整 JSON 备份">复制</button>
      <button class="copy-btn" type="button" data-action="download-json" data-tip="下载完整 JSON 备份文件，用于手动备份或迁移。" aria-label="下载 JSON 备份">下载</button>
      <button class="copy-btn" type="button" data-action="import-json" data-tip="导入 JSON 备份，按 id 合并去重，不静默覆盖本机新增记录。" aria-label="导入 JSON 备份">导入</button>
      <button class="copy-btn" id="share-btn" type="button" data-action="share-json" data-tip="打开系统分享面板，优先分享 JSON 文件。" aria-label="分享 JSON 备份">分享</button>
    </div>
  </div>
</div>
<input type="file" id="import-file" accept="application/json" style="display:none">

<script>
  const KEY = 'timelog.v1';
  const THEME_KEY = 'timelog.theme';
  const VIEW_KEY = 'timelog.view';
  const SELECTED_DATE_KEY = 'timelog.selectedDate';
  const OPEN_DATE_KEY = 'timelog.openDate';
  const GAP = 180;
  const SEEDS = ['求职推进', '研究·学工具·逃避', '未知', '杂'];
  const ITEM_H = 40;
  const PAD = 80;
  const DAYS_BACK = 90;
  const DAYS_FWD = 7;

  let editingId = null;
  let sheetEditId = null;
  let sheetScrollY = 0;
  let sheetTimeMounted = false;
  let pendingUpdateRegistration = null;
  let updateReloading = false;
  let formTag = '';
  let state = { view: 'day', selectedDate: '' };

  // --- Storage ---
  function load() {
    try { return JSON.parse(localStorage.getItem(KEY)) || { version: 1, entries: [] }; }
    catch { return { version: 1, entries: [] }; }
  }
  function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  // --- Date utils ---
  function p2(n) { return String(n).padStart(2, '0'); }
  function localDateKey(d) {
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
  }
  function nowStr() {
    const d = new Date();
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}T${p2(d.getHours())}:${p2(d.getMinutes())}`;
  }
  function todayStr() { return localDateKey(new Date()); }
  function hhmm(ts) {
    const d = new Date(ts);
    return `${p2(d.getHours())}:${p2(d.getMinutes())}`;
  }
  function parseDateKey(key) {
    const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(key || '');
    if (!m) return null;
    const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    if (d.getFullYear() !== Number(m[1]) || d.getMonth() !== Number(m[2]) - 1 || d.getDate() !== Number(m[3])) return null;
    return d;
  }
  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate() + n); return x; }
  function addMonths(d, n) { const x = new Date(d); x.setMonth(x.getMonth() + n); return x; }
  function addYears(d, n) { const x = new Date(d); x.setFullYear(x.getFullYear() + n); return x; }
  function startOfDay(d) { return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
  function startOfWeek(d) {
    const x = startOfDay(d);
    const day = x.getDay() || 7;
    x.setDate(x.getDate() - day + 1);
    return x;
  }
  function startOfMonth(d) { return new Date(d.getFullYear(), d.getMonth(), 1); }
  function startOfYear(d) { return new Date(d.getFullYear(), 0, 1); }
  function clampEndToNow(end) {
    const now = new Date();
    return end > now ? now : end;
  }
  function minsBetweenDates(a, b) { return Math.max(0, (b - a) / 60000); }
  function fmtMins(m) {
    if (m < 1) return '<1min';
    if (m < 60) return `~${Math.round(m)}min`;
    const h = Math.floor(m / 60), rem = Math.round(m % 60);
    return rem ? `~${h}h${rem}min` : `~${h}h`;
  }
  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function iconSvg(name) {
    const icons = {
      edit: '<path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>',
      trash: '<path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path>',
      check: '<path d="M20 6 9 17l-5-5"></path>',
      undo: '<path d="M9 14 4 9l5-5"></path><path d="M4 9h10a6 6 0 0 1 0 12h-2"></path>'
    };
    return `<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">${icons[name] || ''}</svg>`;
  }
  function setButtonTip(el, text, ariaLabel) {
    if (!el) return;
    el.dataset.tip = text;
    if (ariaLabel) el.setAttribute('aria-label', ariaLabel);
  }
  function mdInline(s) {
    return String(s || '').replace(/\s+/g, ' ').trim().replace(/\|/g, '\\|');
  }
  function fmtPlainMins(m) {
    return m > 0 ? fmtMins(m) : '0min';
  }
  function fmtDateTime(d) {
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`;
  }
  function fmtTs(ts) {
    const value = normalizeTimestamp(ts);
    return value ? value.replace('T', ' ') : String(ts || '');
  }
  function normalizeTimestamp(raw) {
    const value = String(raw || '').trim();
    const m = /^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})[ T]+(\d{1,2}):(\d{1,2})$/.exec(value);
    if (!m) return '';
    const y = Number(m[1]), mo = Number(m[2]), da = Number(m[3]), h = Number(m[4]), mi = Number(m[5]);
    const d = new Date(y, mo - 1, da, h, mi);
    if (d.getFullYear() !== y || d.getMonth() !== mo - 1 || d.getDate() !== da || d.getHours() !== h || d.getMinutes() !== mi) return '';
    return `${y}-${p2(mo)}-${p2(da)}T${p2(h)}:${p2(mi)}`;
  }
  function validateTs(raw) {
    const ts = normalizeTimestamp(raw);
    if (!ts) return { ok: false, msg: '请输入完整日期和时间，例如 2026-06-28 09:05。' };
    if (new Date(ts) > new Date(Date.now() + 5 * 60000)) return { ok: false, msg: '不能记录明显未来的时间。' };
    return { ok: true, ts };
  }
  function setTimeInputError(scope, msg) {
    if (!scope) return;
    let err = scope.querySelector('[data-role="time-error"]');
    if (!err && msg) {
      err = document.createElement('div');
      err.className = 'dt-error';
      err.dataset.role = 'time-error';
      scope.appendChild(err);
    }
    if (!err) return;
    err.textContent = msg || '';
    err.hidden = !msg;
  }
  function defaultFormTs() {
    const n = new Date();
    const candidate = `${state.selectedDate || todayStr()}T${p2(n.getHours())}:${p2(n.getMinutes())}`;
    return new Date(candidate) > new Date(Date.now() + 5 * 60000) ? nowStr() : candidate;
  }
  function dateLabel(d) {
    return `${d.getFullYear()}/${p2(d.getMonth()+1)}/${p2(d.getDate())} 周${'日一二三四五六'[d.getDay()]}`;
  }
  function shortDateLabel(d) { return `${d.getMonth()+1}/${d.getDate()} 周${'日一二三四五六'[d.getDay()]}`; }
  function periodRange(view = state.view, dateKey = state.selectedDate) {
    const base = parseDateKey(dateKey) || new Date();
    if (view === 'week') {
      const start = startOfWeek(base);
      return { start, end: addDays(start, 7) };
    }
    if (view === 'month') {
      const start = startOfMonth(base);
      return { start, end: addMonths(start, 1) };
    }
    if (view === 'year') {
      const start = startOfYear(base);
      return { start, end: addYears(start, 1) };
    }
    const start = startOfDay(base);
    return { start, end: addDays(start, 1) };
  }
  function periodLabel() {
    const { start, end } = periodRange();
    const last = addDays(end, -1);
    if (state.view === 'day') return dateLabel(start);
    if (state.view === 'week') return `${dateLabel(start)} - ${p2(last.getMonth()+1)}/${p2(last.getDate())}`;
    if (state.view === 'month') return `${start.getFullYear()}年${start.getMonth()+1}月`;
    return `${start.getFullYear()}年`;
  }
  function persistState() {
    localStorage.setItem(VIEW_KEY, state.view);
    localStorage.setItem(SELECTED_DATE_KEY, state.selectedDate);
  }

  // --- Theme ---
  function getSysPref() {
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  function applyTheme(pref) {
    const html = document.documentElement;
    if (pref === 'auto') {
      html.removeAttribute('data-theme');
    } else {
      html.setAttribute('data-theme', pref);
    }
    const effective = pref === 'auto' ? getSysPref() : pref;
    document.getElementById('meta-theme-color').setAttribute('content', effective === 'light' ? '#f7f7fa' : '#0d0d14');
    document.querySelectorAll('#theme-seg button').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.theme === pref);
    });
  }
  function setThemePref(pref) {
    localStorage.setItem(THEME_KEY, pref);
    applyTheme(pref);
  }

  // --- Wheel picker ---
  function buildDateItems() {
    const now = new Date();
    const items = [];
    for (let i = DAYS_BACK; i >= -DAYS_FWD; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const y = d.getFullYear(), mo = d.getMonth() + 1, da = d.getDate();
      const dow = '日一二三四五六'[d.getDay()];
      items.push({ val: `${y}-${p2(mo)}-${p2(da)}`, label: `${mo}月${da}日 周${dow}` });
    }
    return items;
  }

  function mountTimePicker(mountEl, initialValue, onChangeCb) {
    const coarse = window.matchMedia('(pointer: coarse)').matches || window.innerWidth < 720;
    if (coarse) mountWheel(mountEl, initialValue, onChangeCb);
    else mountDesktopTimePicker(mountEl, initialValue, onChangeCb);
  }

  function mountWheel(mountEl, initialValue, onChangeCb) {
    const dateItems = buildDateItems();
    const hourItems = Array.from({length: 24}, (_, i) => ({ val: p2(i), label: p2(i) }));
    const minItems  = Array.from({length: 60}, (_, i) => ({ val: p2(i), label: p2(i) }));

    const [datePart, timePart] = (initialValue || nowStr()).split('T');
    const [initH, initM] = (timePart || '00:00').split(':').map(Number);
    const initDateIdx = Math.max(0, dateItems.findIndex(x => x.val === datePart));

    let selDate = initDateIdx, selH = initH, selM = initM;

    function emit() {
      onChangeCb(`${dateItems[selDate].val}T${p2(selH)}:${p2(selM)}`);
    }

    function makeCol(items, initIdx, onSelect, extraClass) {
      const col = document.createElement('div');
      col.className = 'wheel-col' + (extraClass ? ' ' + extraClass : '');
      col.tabIndex = 0;

      const inner = document.createElement('div');
      inner.style.paddingTop = PAD + 'px';
      inner.style.paddingBottom = PAD + 'px';

      items.forEach((item, idx) => {
        const el = document.createElement('div');
        el.className = 'wheel-item';
        el.textContent = item.label;
        el.addEventListener('click', () => col.scrollTo({ top: idx * ITEM_H, behavior: 'smooth' }));
        inner.appendChild(el);
      });
      col.appendChild(inner);

      function getIdx() {
        return Math.min(Math.max(Math.round(col.scrollTop / ITEM_H), 0), items.length - 1);
      }
      function onSnap() { onSelect(getIdx()); }

      if ('onscrollend' in window) {
        col.addEventListener('scrollend', onSnap);
      } else {
        let t;
        col.addEventListener('scroll', () => { clearTimeout(t); t = setTimeout(onSnap, 150); });
      }

      col.addEventListener('keydown', e => {
        const cur = getIdx();
        if (e.key === 'ArrowUp' && cur > 0) {
          e.preventDefault();
          col.scrollTo({ top: (cur - 1) * ITEM_H, behavior: 'smooth' });
        } else if (e.key === 'ArrowDown' && cur < items.length - 1) {
          e.preventDefault();

    document.getElementById('add-btn').hidden = state.view !== 'day';

  function timelineDurationLabel(mins, isOngoing, unrecorded, pendingConfirm) {

  // --- Form ---
  function openForm() {
    state.view = 'day';
    persistState();
    const box = document.getElementById('form-box');
    box.style.display = 'block';
    const ts = defaultFormTs();
    document.getElementById('form-ts').value = ts;
    mountTimePicker(document.getElementById('form-wheel-mount'), ts, v => {
      document.getElementById('form-ts').value = v;
    });
    document.getElementById('form-what').value = '';
    document.getElementById('form-ctag').value = '';
    formTag = '';
    document.querySelectorAll('#form-chips .chip').forEach(c => c.classList.remove('sel'));
    renderChrome();
  }
  function isFormOpen() {
    return document.getElementById('form-box').style.display === 'block';
  }
  function closeForm() {
    document.getElementById('form-box').style.display = 'none';
  }
  function pickTag(el) {
    const wasSelected = el.classList.contains('sel');
    document.querySelectorAll('#form-chips .chip').forEach(c => c.classList.remove('sel'));
    if (wasSelected) {
      formTag = '';
      return;
    }
    el.classList.add('sel');
    formTag = el.dataset.tag || '';
    document.getElementById('form-ctag').value = '';
  }
  function saveEntry() {
    const timeScope = document.getElementById('form-wheel-mount');
    const checked = validateTs(document.getElementById('form-ts').value);
    if (!checked.ok) {
      setTimeInputError(timeScope, checked.msg);
      const focusEl = timeScope.querySelector('[data-role="text"], [data-role="date"]');
      if (focusEl) focusEl.focus();
      return;
    }
    setTimeInputError(timeScope, '');
    const what = document.getElementById('form-what').value.trim();
    if (!what) { document.getElementById('form-what').focus(); return; }
    const ctag = document.getElementById('form-ctag').value.trim();
    const tag = ctag || formTag || '未知';
    const d = load();
    d.entries.push({ id: uid(), ts: checked.ts, what, tags: [tag] });
    save(d);
    setSelectedDate(checked.ts.slice(0, 10));
    closeForm();
    render();
  }

  // --- Edit ---
  function getEditingBox(id = editingId) {
    return Array.from(document.querySelectorAll('.entry.editing, .edit-sheet-panel'))
      .find(el => el.dataset.id === String(id));
  }
  function useEditSheet() {
    return window.matchMedia('(pointer: coarse)').matches || window.innerWidth <= 720;
  }
  function lockBodyForSheet() {
    sheetScrollY = window.scrollY || document.documentElement.scrollTop || 0;
    document.body.style.position = 'fixed';
    document.body.style.top = `-${sheetScrollY}px`;
    document.body.style.left = '0';
    document.body.style.right = '0';
    document.body.style.width = '100%';
    document.body.classList.add('sheet-open');
  }
  function unlockBodyForSheet() {
    document.body.classList.remove('sheet-open');
    document.body.style.position = '';
    document.body.style.top = '';
    document.body.style.left = '';
    document.body.style.right = '';
    document.body.style.width = '';
    window.scrollTo(0, sheetScrollY);
  }
  function openEditSheet(id) {
    const entry = load().entries.find(e => e.id === id);
    if (!entry) return;
    editingId = null;
    sheetEditId = id;
    sheetTimeMounted = false;
    closeForm();
    render();
    const sheet = document.getElementById('edit-sheet');
    const panel = sheet.querySelector('.edit-sheet-panel');
    panel.dataset.id = id;
    panel.innerHTML = renderEditSheet(entry);
    sheet.hidden = false;
    lockBodyForSheet();
  }
  function closeEditSheet() {
    const sheet = document.getElementById('edit-sheet');
    const wasOpen = sheet && !sheet.hidden;
    if (sheet) {
      sheet.hidden = true;
      const panel = sheet.querySelector('.edit-sheet-panel');
      if (panel) {
        panel.innerHTML = '';
        delete panel.dataset.id;
      }
    }
    sheetEditId = null;
    sheetTimeMounted = false;
    if (wasOpen) unlockBodyForSheet();
  }
  function startEdit(id) {
    if (useEditSheet()) {
      openEditSheet(id);
      return;
    }
    closeEditSheet();
    editingId = id;
    closeForm();
    render();
  }
  function cancelEdit() {
    const changed = Boolean(editingId || sheetEditId);
    closeEditSheet();
    editingId = null;
    if (changed) render();
  }
  function pickEditTag(el) {
    const box = el.closest('.entry.editing, .edit-sheet-panel');
    const chipBox = box ? box.querySelector('[data-role="edit-chips"]') : null;
    if (!chipBox) return;
    const wasSelected = el.classList.contains('sel');
    chipBox.querySelectorAll('.chip').forEach(c => c.classList.remove('sel'));
    if (wasSelected) return;
    el.classList.add('sel');
    const custom = box.querySelector('[data-role="edit-custom-tag"]');
    if (custom) custom.value = '';
  }
  function toggleEditTime(el) {
    const box = el.closest('.entry.editing, .edit-sheet-panel');
    if (!box) return;
    const section = box.querySelector('[data-role="edit-time-section"]');
    const mountEl = box.querySelector('[data-role="edit-wheel"]');
    const tsEl = box.querySelector('[data-role="edit-ts"]');
    if (!section || !mountEl || !tsEl) return;
    const willOpen = section.hidden;
    section.hidden = !willOpen;
    el.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
    el.textContent = willOpen ? '收起时间' : '修改时间';
    if (willOpen && (!sheetTimeMounted || box.classList.contains('entry'))) {
      mountTimePicker(mountEl, tsEl.value, v => {
        tsEl.value = v;
      });
      sheetTimeMounted = true;
    }
  }
  function commitEdit(id) {
    const box = getEditingBox(id);
    if (!box) return;
    const tsEl = box.querySelector('[data-role="edit-ts"]');
    const whatEl = box.querySelector('[data-role="edit-what"]');
    const chipBox = box.querySelector('[data-role="edit-chips"]');
    const customEl = box.querySelector('[data-role="edit-custom-tag"]');
    const timeScope = box.querySelector('[data-role="edit-wheel"]') || box;
    const checked = validateTs(tsEl ? tsEl.value : '');
    if (!checked.ok) {
      setTimeInputError(timeScope, checked.msg);
      const focusEl = timeScope.querySelector('[data-role="text"], [data-role="date"]');
      if (focusEl) focusEl.focus();
      return;
    }
    setTimeInputError(timeScope, '');
    const what = whatEl ? whatEl.value.trim() : '';
    if (!what) { if (whatEl) whatEl.focus(); return; }
    const sel = chipBox ? chipBox.querySelector('.chip.sel') : null;
    const ctag = customEl ? customEl.value.trim() : '';
    const tag = ctag || (sel ? sel.dataset.tag : '未知');
    const d = load();
    const entry = d.entries.find(e => e.id === id);
    if (entry) { entry.ts = checked.ts; entry.what = what; entry.tags = [tag]; save(d); }
    setSelectedDate(checked.ts.slice(0, 10));
    closeEditSheet();
    editingId = null;
    render();
  }
  function confirmSegmentInData(d, id, endTs) {
    const entries = sortedEntriesFrom(d && d.entries);
    const index = entries.findIndex(e => e.id === id);
    const entry = entries[index];
    const next = entries[index + 1];
    if (!entry || !next || next.ts !== endTs) {
      return { ok: false, reason: 'stale' };
    }
    const tag = primaryTag(entry);
    const rawMins = minsBetweenDates(new Date(entry.ts), new Date(next.ts));
    if (!isKnownTag(tag) || rawMins <= GAP) {
      return { ok: false, reason: 'not-required' };
    }
    const stored = (d.entries || []).find(e => e.id === id);
    if (!stored) return { ok: false, reason: 'missing' };
    stored.longConfirm = { startTs: stored.ts, endTs };
    return { ok: true, entry: stored };
  }
  function confirmSegment(id, endTs) {
    const d = load();
    const result = confirmSegmentInData(d, id, endTs);
    if (!result.ok) {
      if (result.reason === 'stale') {
        alert('这段时间已经变化，请重新查看后再确认。');
      }
      render();
      return;
    }
    save(d);
    render();
  }

  // --- Delete ---
  function delEntry(id) {
    if (!confirm('删除这条记录？')) return;
    const d = load();
    d.entries = d.entries.filter(e => e.id !== id);
    save(d);
    if (editingId === id) editingId = null;
    if (sheetEditId === id) closeEditSheet();
    render();
  }

  // --- Current view summary ---
  function viewName(view = state.view) {
    return ({ day: '天', week: '周', month: '月', year: '年' })[view] || view;
  }
  function currentViewTotals() {
    if (state.view === 'day') return computeDay().totals;
    const { start, end } = periodRange();
    return summarizeRange(start, end, { clipToFirst: true });
  }
  function statsParts(totals) {
    const jp = formatPercent(totals.job, totals.total);
    const op = formatPercent(totals.other, totals.total);
    const up = formatPercent(totals.unrecorded, totals.total);
    return { jp, op, up };
  }
  function dataDateRange() {
    const entries = sortedEntries();
    if (!entries.length) return '无记录';
    return `${fmtTs(entries[0].ts)} - ${fmtTs(entries[entries.length - 1].ts)}`;
  }
  function detailDurationLabel(mins, isOngoing, unrecorded, pendingConfirm) {
    const label = fmtPlainMins(mins);
    const notes = [];
    if (pendingConfirm) notes.push('待确认');
    else if (unrecorded) notes.push('未记录');
    if (isOngoing) notes.push('进行中');
    return notes.length ? `${label}（${notes.join('，')}）` : label;
  }
  function currentViewDetailLines() {
    if (state.view === 'day') {
      const day = computeDay();
      if (!day.timeline.length) return ['- 无记录'];
      return day.timeline.map(({ e, mins, isOngoing, unrecorded, pendingConfirm, tag }) => {
        const safeWhat = mdInline(e.what) || '未填写';
        const safeTag = mdInline(tag || '未知');
        return `- ${hhmm(e.ts)} | ${detailDurationLabel(mins, isOngoing, unrecorded, pendingConfirm)} | ${safeWhat} | #${safeTag}`;
      });
    }
    const rows = summaryRows();
    if (!rows.length) return ['- 无记录'];
    return rows.map(row => {
      const totals = summarizeRange(row.rangeStart, row.rangeEnd, { clipToFirst: true });
      const { jp, op, up } = statsParts(totals);
      const totalText = totals.total ? fmtMins(totals.total) : '无记录';
      const pendingText = totals.pending ? ` / 待确认 ${fmtPlainMins(totals.pending)}` : '';
      return `- ${row.label}: ${totalText}；求职 ${jp} / 其他 ${op} / 未记录 ${up}${pendingText}`;
    });
  }
  function buildCurrentViewSummaryMarkdown() {
    const totals = currentViewTotals();
    const { jp, op, up } = statsParts(totals);
    const totalEntries = load().entries.length;
    return [
      '# 时间尺当前视图摘要',
      '',
      '## 元信息',
      `- 生成时间：${fmtDateTime(new Date())}`,
      `- 当前视图：${viewName()}`,
      `- 当前周期：${periodLabel()}`,
      `- 数据起止日期：${dataDateRange()}`,
      `- 总记录数：${totalEntries}`,
      '',
      '## 当前视图统计比例',
      `- 总计：${fmtPlainMins(totals.total)}`,
      `- 求职推进：${jp}（${fmtPlainMins(totals.job)}）`,
      `- 其他：${op}（${fmtPlainMins(totals.other)}）`,
      `- 未记录：${up}（${fmtPlainMins(totals.unrecorded)}）`,
      `- 待确认：${fmtPlainMins(totals.pending || 0)}`,
      '',
      '## 当前视图明细',
      ...currentViewDetailLines(),
      ''
    ].join('\n');
  }

  // --- Copy ---
  function setCopyFeedback(btn, ok, label, fallbackLabel) {
    if (!btn) return;
    btn.textContent = ok ? label : '复制失败';
    btn.classList.toggle('copied', ok);
    setTimeout(() => {
      btn.textContent = fallbackLabel;
      btn.classList.remove('copied');
    }, 2500);
  }
  function copyText(text, btn, label, fallbackLabel) {
    const done = ok => setCopyFeedback(btn, ok, label, fallbackLabel);
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text)
        .then(() => done(true))
        .catch(() => done(legacyCopy(text)));
      return;
    }
    done(legacyCopy(text));
  }
  function copyJSON() {
    const json = JSON.stringify(load(), null, 2);
    copyText(json, document.getElementById('copy-btn'), '✓ 已复制', '复制');
  }
  function copyCurrentViewSummary() {
    copyText(buildCurrentViewSummaryMarkdown(), document.getElementById('summary-btn'), '✓ 已复制', '摘要');
  }
  function legacyCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch {}
    document.body.removeChild(ta);
    return ok;
  }

  // --- Download JSON ---
  function downloadJSON() {
    const json = JSON.stringify(load(), null, 2);
    const now = new Date();
    const fname = `timelog-${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}-${p2(now.getHours())}${p2(now.getMinutes())}.json`;
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = fname;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // --- Import JSON ---
  function importJSON() { document.getElementById('import-file').click(); }
  function handleImport(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      let imported;
      try { imported = JSON.parse(e.target.result); }
      catch { alert('文件解析失败，请确认是有效的 JSON 文件。'); return; }
      if (!imported || !Array.isArray(imported.entries)) {
        alert('文件格式不对：缺少 entries 数组。'); return;
      }
      if (!imported.entries.every(en => en.id && en.ts && en.what && normalizeTimestamp(en.ts))) {
        alert('文件格式不对：部分条目缺少必要字段（id/ts/what）或时间格式不正确。'); return;
      }
      const current = load();
      const map = {};
      current.entries.forEach(en => { map[en.id] = en; });
      imported.entries.forEach(en => { map[en.id] = en; });
      current.entries = Object.values(map).sort((a, b) => a.ts < b.ts ? -1 : 1);
      save(current);
      render();
      alert(`导入完成，共 ${current.entries.length} 条记录。`);
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  // --- Share JSON ---
  function canUseSystemShare() {
    return typeof navigator !== 'undefined' && typeof navigator.share === 'function';
  }
  function updateShareAvailability() {
    const btn = document.getElementById('share-btn');
    if (!btn) return;
    const supported = canUseSystemShare();
    btn.hidden = !supported;
    btn.setAttribute('aria-disabled', supported ? 'false' : 'true');
    if (supported) setButtonTip(btn, '打开系统分享面板，优先分享 JSON 文件；文件分享不可用时改为分享文本。', '分享 JSON 备份');
  }
  function shareJSON() {
    if (!canUseSystemShare()) return;
    const json = JSON.stringify(load(), null, 2);
    const now = new Date();
    const fname = `timelog-${now.getFullYear()}${p2(now.getMonth()+1)}${p2(now.getDate())}-${p2(now.getHours())}${p2(now.getMinutes())}.json`;
    if (navigator.canShare) {
      const file = new File([json], fname, { type: 'application/json' });
      if (navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: '时间尺备份' }).catch(() => {});
        return;
      }
    }
    navigator.share({ title: '时间尺备份', text: json }).catch(() => {});
  }

  // --- App update prompt ---
  function showUpdatePrompt(registration) {
    pendingUpdateRegistration = registration;
    const banner = document.getElementById('update-banner');
    if (banner) banner.hidden = false;
  }
  function applyUpdate() {
    const worker = pendingUpdateRegistration && pendingUpdateRegistration.waiting;
    if (!worker) {
      window.location.reload();
      return;
    }
    updateReloading = true;
    worker.postMessage({ type: 'SKIP_WAITING' });
  }

  // --- Test API ---
  function exposeTestApi() {
    window.__timelogTest = {
      GAP,
      addBucket,
      buildRangeSegmentsFromEntries,
      classifySegment,
      confirmSegmentInData,
      emptyTotals,
      formatPercent,
      isKnownTag,
      isSegmentConfirmed,
      minsBetweenDates,
      normalizeTimestamp,
      percentValue,
      primaryTag,
      sortedEntriesFrom,
      summarizeEntries
    };
  }

  // --- Actions ---
  function registerActions() {
    document.addEventListener('click', e => {
      const el = e.target.closest('[data-action]');
      if (!el || el.disabled || el.getAttribute('aria-disabled') === 'true') return;
      const action = el.dataset.action;
      if (action === 'theme') setThemePref(el.dataset.theme);
      if (action === 'view') setView(el.dataset.view);
      if (action === 'shift-period') shiftPeriod(Number(el.dataset.delta || 0));
      if (action === 'today') goToday();
      if (action === 'open-form') openForm();
      if (action === 'pick-form-tag') pickTag(el);
      if (action === 'save-entry') saveEntry();
      if (action === 'close-form') closeForm();
      if (action === 'start-edit') startEdit(el.dataset.id);
      if (action === 'pick-edit-tag') pickEditTag(el);
      if (action === 'toggle-edit-time') toggleEditTime(el);
      if (action === 'commit-edit') commitEdit(el.dataset.id || editingId);
      if (action === 'cancel-edit') cancelEdit();
      if (action === 'confirm-segment') confirmSegment(el.dataset.id, el.dataset.end);
      if (action === 'delete-entry') delEntry(el.dataset.id);
      if (action === 'drill') drill(el.dataset.date, el.dataset.view);
      if (action === 'copy-summary') copyCurrentViewSummary();
      if (action === 'copy-json') copyJSON();
      if (action === 'download-json') downloadJSON();
      if (action === 'import-json') importJSON();
      if (action === 'share-json') shareJSON();
      if (action === 'update-app') applyUpdate();
    });
    document.getElementById('import-file').addEventListener('change', handleImport);

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { cancelEdit(); closeForm(); }
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        if (editingId || sheetEditId) { commitEdit(editingId || sheetEditId); return; }
        if (document.getElementById('form-box').style.display === 'block') saveEntry();
      }
    });
  }

  // --- Register SW ---
  function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (updateReloading) window.location.reload();
    });
    navigator.serviceWorker.register('sw.js').then(reg => {
      if (reg.waiting && navigator.serviceWorker.controller) showUpdatePrompt(reg);
      reg.addEventListener('updatefound', () => {
        const worker = reg.installing;
        if (!worker) return;
        worker.addEventListener('statechange', () => {
          if (worker.state === 'installed' && navigator.serviceWorker.controller) showUpdatePrompt(reg);
        });
      });
    }).catch(() => {});
  }

  // --- Init ---
  function init() {
    const today = todayStr();
    const lastOpen = localStorage.getItem(OPEN_DATE_KEY);
    const savedView = localStorage.getItem(VIEW_KEY);
    const savedDate = parseDateKey(localStorage.getItem(SELECTED_DATE_KEY));
    state.view = ['day', 'week', 'month', 'year'].includes(savedView) ? savedView : 'day';
    state.selectedDate = lastOpen === today && savedDate ? localDateKey(savedDate) : today;
    localStorage.setItem(OPEN_DATE_KEY, today);
    persistState();

    applyTheme(localStorage.getItem(THEME_KEY) || 'auto');
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    if (mq.addEventListener) mq.addEventListener('change', () => applyTheme(localStorage.getItem(THEME_KEY) || 'auto'));
    document.getElementById('hdr-date').textContent = dateLabel(new Date());
    render();
    setInterval(() => {
      if (!editingId && !sheetEditId && !isFormOpen()) render();
    }, 60000);
  }

  if (window.__TIMELOG_TEST__) {
    exposeTestApi();
  } else {
    registerActions();
    registerServiceWorker();
    init();
  }
</script>
</body>
</html>
