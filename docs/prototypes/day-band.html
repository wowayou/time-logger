<!DOCTYPE html>
<!--
  时间尺 (time-logger) — 阶段0 交互调研原型「比例日程带」（仅 demo 数据，非运行时资产）
  Copyright © 2026 wowayou — https://github.com/wowayou/time-logger
  SPDX-License-Identifier: AGPL-3.0-or-later

  背景：v34/v35「直接操纵 rail」（拖边界改时间）在 SE2 真机验收后被判定观感不及预期，
  已在 v36 回退为 v33 卡片列表。这个原型探索「既要一眼看出时间去哪了、又不引入拖拽结构
  风险」的方向：日程带纯只读、不可拖，一切编辑仍走下方卡片列表（与已发布运行时同款）。
  demo 数据刻意覆盖真实分布（近 8h 的整块睡眠 + 一大段专注工作 + 大量 20-45min 碎片），
  不用均匀数据——P17 的教训是均匀 demo 数据会把「大块撞钳制」类缺陷完全藏起来；这个原型
  不做任何钳制/像素:分钟线性映射，所以没有同类结构风险，但仍用真实分布来验证长块视觉观感。
-->
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>提案 E · 比例日程带 — 时间尺交互调研</title>
<style>
  :root {
    --r-ctl: 12px; --r-card: 16px; --r-sheet: 22px;
    --fs-cap: 12px; --fs-ui: 13px; --fs-body: 15px; --fs-title: 17px;
    --t-fast: 140ms ease-out; --t-med: 280ms cubic-bezier(0.32,0.72,0,1);
    --icon-btn: 40px;
  }
  html[data-theme="dark"] {
    --bg: #0e0f13; --card: #16171e; --input: #1d1f29; --border: rgba(255,255,255,0.09);
    --track: #262838; --accent: #8b7cff; --accent-bg: rgba(139,124,255,0.14);
    --maintain: #46a878; --maintain-bg: rgba(70,168,120,0.14);
    --leak: #c9803c; --leak-bg: rgba(201,128,60,0.16);
    --text: #e8e9f1; --muted: #9fa1b8; --faint: #6c6e85; --danger: #e0596b;
    --shadow-1: 0 1px 2px rgba(0,0,0,0.40); --shadow-2: 0 4px 16px rgba(0,0,0,0.35);
    --shadow-3: 0 16px 48px rgba(0,0,0,0.50); --top-light: inset 0 1px 0 rgba(255,255,255,0.045);
  }
  html[data-theme="light"] {
    --bg: #f7f5f1; --card: #ffffff; --input: #f1efe9; --border: rgba(48,42,30,0.10);
    --track: #e4e1d9; --accent: #6b5ce6; --accent-bg: #efecfc;
    --maintain: #3f9e70; --maintain-bg: #e9f4ee;
    --leak: #c4703a; --leak-bg: #f8ede4;
    --text: #33323b; --muted: #77747f; --faint: #a09da8; --danger: #cf4d5e;
    --shadow-1: 0 1px 2px rgba(48,42,30,0.06), 0 2px 8px rgba(48,42,30,0.05);
    --shadow-2: 0 2px 6px rgba(48,42,30,0.07), 0 10px 28px rgba(48,42,30,0.08);
    --shadow-3: 0 8px 20px rgba(48,42,30,0.10), 0 28px 64px rgba(48,42,30,0.14);
    --top-light: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: -apple-system,'PingFang SC','Helvetica Neue',system-ui,sans-serif;
    font-size: 16px; line-height: 1.5; padding: 16px 14px 60px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .top-bar h1 { font-size: var(--fs-title); }
  .theme-toggle { display: flex; gap: 6px; }
  .theme-toggle button {
    font-size: var(--fs-cap); padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-family: inherit;
  }
  .theme-toggle button.active { color: #fff; background: var(--accent); border-color: var(--accent); }
  .note {
    font-size: var(--fs-ui); color: var(--muted); background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r-card); padding: 10px 12px; margin-bottom: 16px; box-shadow: var(--shadow-1);
  }
  .note b { color: var(--text); }

  /* ===== 比例日程带：纯只读，无拖拽 ===== */
  .band-section { margin-bottom: 22px; }
  .band-label { font-size: var(--fs-cap); color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .band {
    display: flex; flex-direction: column; height: 420px; border-radius: var(--r-card);
    overflow: hidden; box-shadow: var(--shadow-1); border: 1px solid var(--border);
  }
  .band-seg {
    position: relative; display: flex; align-items: center; padding: 0 10px;
    border-bottom: 1px solid var(--bg); cursor: pointer; font-size: var(--fs-cap);
    color: rgba(255,255,255,0.92); transition: filter var(--t-fast);
    overflow: hidden;
  }
  .band-seg:last-child { border-bottom: none; }
  .band-seg:active, .band-seg:focus-visible { filter: brightness(1.12); outline: none; }
  .band-seg.bk-job { background: var(--accent); }
  .band-seg.bk-maintain { background: var(--maintain); }
  .band-seg.bk-leak { background: var(--leak); }
  .band-seg.bk-unrecorded { background: var(--track); color: var(--muted); }
  .band-seg .bs-time { font-variant-numeric: tabular-nums; opacity: 0.85; margin-right: 8px; flex: 0 0 auto; }
  .band-seg .bs-what { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
  /* 极薄碎片（<10px）：文字自动隐藏，只留可点色带；靠 popover 看内容，不强行挤文字。*/
  .band-seg.bs-sliver .bs-time, .band-seg.bs-sliver .bs-what { display: none; }

  /* 点按弹出的详情条（不是编辑，只是只读摘要 + 跳转编辑按钮） */
  .peek {
    position: fixed; left: 14px; right: 14px; bottom: 14px; z-index: 40;
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r-card);
    box-shadow: var(--shadow-3); padding: 14px 16px; transform: translateY(140%);
    transition: transform var(--t-med);
  }
  .peek.open { transform: translateY(0); }
  .peek-time { font-size: var(--fs-cap); color: var(--muted); margin-bottom: 2px; font-variant-numeric: tabular-nums; }
  .peek-what { font-size: var(--fs-body); margin-bottom: 10px; }
  .peek-btns { display: flex; gap: 8px; }
  .peek-btns button {
    flex: 1; height: 38px; border-radius: var(--r-ctl); border: none; font-family: inherit;
    font-size: var(--fs-ui); font-weight: 600; cursor: pointer;
  }
  .peek-edit { background: var(--accent); color: #fff; }
  .peek-close { background: var(--input); color: var(--text); }

  /* ===== 下方：与已发布运行时同款卡片列表（只读演示，未接实际保存） ===== */
  .list-label { font-size: var(--fs-cap); color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
  .entry {
    background: var(--card); border-radius: var(--r-card); padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 10px; border: 1px solid transparent;
    box-shadow: var(--shadow-1), var(--top-light);
  }
  .entry.placeholder { border-color: var(--border); }
  .e-body { flex: 1; min-width: 0; }
  .e-time { font-size: var(--fs-ui); color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 2px; }
  .e-what { font-size: var(--fs-body); margin-bottom: 5px; }
  .entry.placeholder .e-what { color: var(--muted); }
  .e-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .e-tag { font-size: var(--fs-cap); padding: 2px 9px; border-radius: 8px; }
  .e-tag-job { background: var(--accent-bg); color: var(--accent); }
  .e-tag-maintain { background: var(--maintain-bg); color: var(--maintain); }
  .e-tag-leak { background: var(--leak-bg); color: var(--leak); }
  .e-tag-unrecorded { background: var(--input); color: var(--muted); }
  .e-dur { font-size: var(--fs-cap); color: var(--muted); font-variant-numeric: tabular-nums; }
  .e-btns { display: flex; flex-direction: column; gap: 6px; flex: 0 0 var(--icon-btn); width: var(--icon-btn); }
  .icon-btn {
    width: var(--icon-btn); height: var(--icon-btn); display: inline-flex; align-items: center; justify-content: center;
    background: transparent; border: none; color: var(--muted); border-radius: 10px; cursor: pointer;
  }
  .icon-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .icon-btn.dbtn { color: var(--danger); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <h1>提案 E · 比例日程带</h1>
    <div class="theme-toggle">
      <button type="button" data-theme-btn="dark" class="active">暗</button>
      <button type="button" data-theme-btn="light">亮</button>
    </div>
  </div>
  <div class="note">
    <b>核心思路</b>：日程带只读、不可拖——高度按真实分钟数严格比例分配（不钳制、不做像素:分钟实时映射），
    所以没有 v34/v35 那种「拖拽结构性回弹」风险。点一段只弹出摘要卡，真正编辑仍下沉到卡片列表（与已发布
    运行时同款交互）。demo 数据故意混了近 8h 的整块睡眠、4h+ 的专注工作和一堆 20-40min 碎片。
  </div>

  <div class="band-section">
    <div class="band-label">今日比例日程带</div>
    <div class="band" id="band"></div>
  </div>

  <div class="list-label">当日时间轴（卡片，交互不变）</div>
  <div id="list"></div>
</div>

<div class="peek" id="peek">
  <div class="peek-time" id="peek-time"></div>
  <div class="peek-what" id="peek-what"></div>
  <div class="peek-btns">
    <button type="button" class="peek-edit" id="peek-edit">编辑这条</button>
    <button type="button" class="peek-close" id="peek-close">关闭</button>
  </div>
</div>

<script>
(() => {
  // demo 数据：真实分布——一段近 8h 睡眠、一段 4.5h 专注工作、外加大量 20-45min 碎片。
  const DAY_START = 0; // minutes
  const NOW = 21 * 60 + 47; // 21:47，当天截至此刻
  const segments = [
    { start: 0,    end: 465,  what: '睡觉',       bucket: 'maintain' },
    { start: 465,  end: 485,  what: '洗漱',       bucket: 'maintain' },
    { start: 485,  end: 505,  what: '通勤',       bucket: 'maintain' },
    { start: 505,  end: 730,  what: '准备面试',   bucket: 'job' },
    { start: 730,  end: 770,  what: '吃饭',       bucket: 'maintain' },
    { start: 770,  end: 790,  what: '刷手机',     bucket: 'leak' },
    { start: 790,  end: 1060, what: '写项目',     bucket: 'job' },
    { start: 1060, end: 1080, what: '通勤',       bucket: 'maintain' },
    { start: 1080, end: 1120, what: '吃饭',       bucket: 'maintain' },
    { start: 1120, end: 1145, what: '刷手机',     bucket: 'leak' },
    { start: 1145, end: NOW,  what: '准备面试',   bucket: 'job', ongoing: true }
  ];

  function hhmm(mins) {
    const h = Math.floor(mins / 60) % 24;
    const m = mins % 60;
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  }
  function fmtDur(mins) {
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h && m) return `${h}h${m}min`;
    if (h) return `${h}h`;
    return `${m}min`;
  }

  const totalMins = NOW - DAY_START;
  const bandEl = document.getElementById('band');
  const listEl = document.getElementById('list');

  bandEl.innerHTML = segments.map((seg, i) => {
    const mins = seg.end - seg.start;
    const flex = mins / totalMins;
    const sliver = flex * 420 < 22; // 视觉过薄时隐藏文字，只留可点色带
    return `<div class="band-seg bk-${seg.bucket}${sliver ? ' bs-sliver' : ''}" style="flex:${flex}" data-idx="${i}" tabindex="0" role="button"
      aria-label="${hhmm(seg.start)} 到 ${hhmm(seg.end)}，${seg.what}，${fmtDur(mins)}">
      <span class="bs-time">${hhmm(seg.start)}</span><span class="bs-what">${seg.what}</span>
    </div>`;
  }).join('');

  listEl.innerHTML = [...segments].reverse().map(seg => {
    const mins = seg.end - seg.start;
    const durText = seg.ongoing ? `${fmtDur(mins)}（进行中）` : fmtDur(mins);
    return `<div class="entry">
      <div class="e-body">
        <div class="e-time">${hhmm(seg.start)}</div>
        <div class="e-what">${seg.what}</div>
        <div class="e-meta">
          <span class="e-tag e-tag-${seg.bucket}">#${seg.what}</span>
          <span class="e-dur">${durText}</span>
        </div>
      </div>
      <div class="e-btns">
        <button class="icon-btn" type="button" aria-label="编辑记录" data-tip="编辑记录">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        </button>
        <button class="icon-btn dbtn" type="button" aria-label="删除记录" data-tip="删除记录">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');

  const peek = document.getElementById('peek');
  const peekTime = document.getElementById('peek-time');
  const peekWhat = document.getElementById('peek-what');
  document.getElementById('peek-close').addEventListener('click', () => peek.classList.remove('open'));
  document.getElementById('peek-edit').addEventListener('click', () => {
    peek.classList.remove('open');
    document.querySelector('.list-label').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  bandEl.addEventListener('click', e => {
    const el = e.target.closest('.band-seg');
    if (!el) return;
    const seg = segments[Number(el.dataset.idx)];
    const mins = seg.end - seg.start;
    peekTime.textContent = `${hhmm(seg.start)} – ${seg.ongoing ? '现在' : hhmm(seg.end)} · ${fmtDur(mins)}`;
    peekWhat.textContent = seg.what;
    peek.classList.add('open');
  });
  bandEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      e.target.click();
    }
  });

  document.querySelectorAll('[data-theme-btn]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.documentElement.setAttribute('data-theme', btn.dataset.themeBtn);
      document.querySelectorAll('[data-theme-btn]').forEach(b => b.classList.toggle('active', b === btn));
    });
  });
})();
</script>
</body>
</html>
