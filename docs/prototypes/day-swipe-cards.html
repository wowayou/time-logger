<!DOCTYPE html>
<!--
  时间尺 (time-logger) — 阶段0 交互调研原型「滑动卡片」（仅 demo 数据，非运行时资产）
  Copyright © 2026 wowayou — https://github.com/wowayou/time-logger
  SPDX-License-Identifier: AGPL-3.0-or-later

  背景：调研主流时间记录 App（Toggl Track 等）后确认「列表项左滑露出编辑/删除」是验证过的
  真实模式（Toggl 官方文档：Timer 屏幕的记录支持滑动删除/收藏）。这个原型把 v33/v36 卡片右侧
  常驻的编辑/删除图标收起，改成左滑露出，卡片正文因此腾出更多宽度、视觉更干净；
  同时保留一个「⋯」按钮兜底键盘/无触屏场景的可达性（纯滑动手势对键盘用户不可达）。
  demo 数据同 day-band.html：一段近 8h 睡眠 + 一段 4.5h 专注工作 + 大量 20-45min 碎片。
-->
<html lang="zh" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>提案 F · 滑动卡片 — 时间尺交互调研</title>
<style>
  :root {
    --r-ctl: 12px; --r-card: 16px;
    --fs-cap: 12px; --fs-ui: 13px; --fs-body: 15px; --fs-title: 17px;
    --t-fast: 140ms ease-out;
  }
  html[data-theme="dark"] {
    --bg: #0e0f13; --card: #16171e; --input: #1d1f29; --border: rgba(255,255,255,0.09);
    --accent: #8b7cff; --accent-bg: rgba(139,124,255,0.14);
    --maintain: #46a878; --maintain-bg: rgba(70,168,120,0.14);
    --leak: #c9803c; --leak-bg: rgba(201,128,60,0.16);
    --text: #e8e9f1; --muted: #9fa1b8; --faint: #6c6e85; --danger: #e0596b;
    --shadow-1: 0 1px 2px rgba(0,0,0,0.40); --top-light: inset 0 1px 0 rgba(255,255,255,0.045);
  }
  html[data-theme="light"] {
    --bg: #f7f5f1; --card: #ffffff; --input: #f1efe9; --border: rgba(48,42,30,0.10);
    --accent: #6b5ce6; --accent-bg: #efecfc;
    --maintain: #3f9e70; --maintain-bg: #e9f4ee;
    --leak: #c4703a; --leak-bg: #f8ede4;
    --text: #33323b; --muted: #77747f; --faint: #a09da8; --danger: #cf4d5e;
    --shadow-1: 0 1px 2px rgba(48,42,30,0.06), 0 2px 8px rgba(48,42,30,0.05);
    --top-light: none;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg); color: var(--text); min-height: 100vh;
    font-family: -apple-system,'PingFang SC','Helvetica Neue',system-ui,sans-serif;
    font-size: 16px; line-height: 1.5; padding: 16px 14px 60px;
  }
  .wrap { max-width: 480px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .top-bar h1 { font-size: var(--fs-title); }
  .theme-toggle { display: flex; gap: 6px; }
  .theme-toggle button {
    font-size: var(--fs-cap); padding: 5px 10px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--card); color: var(--muted); font-family: inherit;
  }
  .theme-toggle button.active { color: #fff; background: var(--accent); border-color: var(--accent); }
  .note {
    font-size: var(--fs-ui); color: var(--muted); background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r-card); padding: 10px 12px; margin-bottom: 16px; box-shadow: var(--shadow-1);
  }
  .note b { color: var(--text); }
  .list-label { font-size: var(--fs-cap); color: var(--faint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }

  /* ===== 滑动卡片 ===== */
  .swipe-row {
    position: relative; border-radius: var(--r-card); overflow: hidden; margin-bottom: 8px;
    box-shadow: var(--shadow-1);
  }
  .swipe-actions {
    position: absolute; inset: 0; display: flex; justify-content: flex-end;
  }
  .swipe-actions button {
    width: 72px; border: none; color: #fff; font-family: inherit; font-size: var(--fs-cap); font-weight: 600;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer;
  }
  .swipe-actions button svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .act-edit { background: var(--accent); }
  .act-delete { background: var(--danger); }

  .entry {
    position: relative; background: var(--card); padding: 12px 14px; display: flex; align-items: flex-start;
    gap: 10px; border: 1px solid transparent; touch-action: pan-y; transition: transform var(--t-fast);
  }
  .entry.placeholder { border-color: var(--border); }
  .e-body { flex: 1; min-width: 0; }
  .e-time { font-size: var(--fs-ui); color: var(--muted); font-variant-numeric: tabular-nums; margin-bottom: 2px; }
  .e-what { font-size: var(--fs-body); margin-bottom: 5px; }
  .entry.placeholder .e-what { color: var(--muted); }
  .e-meta { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .e-tag { font-size: var(--fs-cap); padding: 2px 9px; border-radius: 8px; }
  .e-tag-job { background: var(--accent-bg); color: var(--accent); }
  .e-tag-maintain { background: var(--maintain-bg); color: var(--maintain); }
  .e-tag-leak { background: var(--leak-bg); color: var(--leak); }
  .e-dur { font-size: var(--fs-cap); color: var(--muted); font-variant-numeric: tabular-nums; }
  /* 键盘/无触屏可达性兜底：常驻的「⋯」按钮，纯手势对键盘用户不可达。 */
  .kebab {
    flex: 0 0 32px; width: 32px; height: 32px; border: none; background: transparent; color: var(--faint);
    border-radius: 8px; cursor: pointer; align-self: center; font-size: 18px; line-height: 1;
  }
  .kebab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top-bar">
    <h1>提案 F · 滑动卡片</h1>
    <div class="theme-toggle">
      <button type="button" data-theme-btn="dark" class="active">暗</button>
      <button type="button" data-theme-btn="light">亮</button>
    </div>
  </div>
  <div class="note">
    <b>核心思路</b>：卡片右侧不再常驻编辑/删除图标，改成左滑露出（Toggl Track 官方模式：Timer
    屏幕记录支持滑动删除/收藏）。正文因此更干净、留白更多。「⋯」按钮兜底键盘/无触屏可达性——
    纯手势对键盘用户不可达，这是滑动模式必须补的口子。试试：向左拖动任意卡片。
  </div>
  <div class="list-label">当日时间轴</div>
  <div id="list"></div>
</div>

<script>
(() => {
  const NOW = 21 * 60 + 47;
  const segments = [
    { start: 0,    end: 465,  what: '睡觉',       bucket: 'maintain' },
    { start: 465,  end: 485,  what: '洗漱',       bucket: 'maintain' },
    { start: 485,  end: 505,  what: '通勤',       bucket: 'maintain' },
    { start: 505,  end: 730,  what: '准备面试',   bucket: 'job' },
    { start: 730,  end: 770,  what: '吃饭',       bucket: 'maintain' },
    { start: 770,  end: 790,  what: '刷手机',     bucket: 'leak' },
    { start: 790,  end: 1060, what: '写项目',     bucket: 'job' },
    { start: 1060, end: 1080, what: '通勤',       bucket: 'maintain' },
    { start: 1080, end: 1120, what: '吃饭',       bucket: 'maintain' },
    { start: 1120, end: 1145, what: '刷手机',     bucket: 'leak' },
    { start: 1145, end: NOW,  what: '准备面试',   bucket: 'job', ongoing: true }
  ];
  function hhmm(mins) {
    const h = Math.floor(mins / 60) % 24;
    const m = mins % 60;
    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  }
  function fmtDur(mins) {
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h && m) return `${h}h${m}min`;
    if (h) return `${h}h`;
    return `${m}min`;
  }

  const listEl = document.getElementById('list');
  listEl.innerHTML = [...segments].reverse().map((seg, i) => {
    const mins = seg.end - seg.start;
    const durText = seg.ongoing ? `${fmtDur(mins)}（进行中）` : fmtDur(mins);
    return `<div class="swipe-row" data-idx="${i}">
      <div class="swipe-actions">
        <button type="button" class="act-edit" aria-label="编辑记录">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          编辑
        </button>
        <button type="button" class="act-delete" aria-label="删除记录">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          删除
        </button>
      </div>
      <div class="entry" data-idx="${i}">
        <div class="e-body">
          <div class="e-time">${hhmm(seg.start)}</div>
          <div class="e-what">${seg.what}</div>
          <div class="e-meta">
            <span class="e-tag e-tag-${seg.bucket}">#${seg.what}</span>
            <span class="e-dur">${durText}</span>
          </div>
        </div>
        <button class="kebab" type="button" aria-label="更多操作" data-tip="更多操作">⋯</button>
      </div>
    </div>`;
  }).join('');

  const ACTION_W = 144; // 两个 72px 按钮

  listEl.querySelectorAll('.entry').forEach(entry => {
    let startX = 0, startY = 0, dx = 0, dragging = false, decided = false, isHorizontal = false;
    let openOffset = 0;

    function setX(x, animate) {
      entry.style.transition = animate ? 'transform var(--t-fast)' : 'none';
      entry.style.transform = `translateX(${x}px)`;
    }

    entry.addEventListener('pointerdown', e => {
      if (e.target.closest('.kebab')) return;
      startX = e.clientX; startY = e.clientY; dx = openOffset; dragging = true; decided = false; isHorizontal = false;
      entry.setPointerCapture(e.pointerId);
    });
    entry.addEventListener('pointermove', e => {
      if (!dragging) return;
      const moveX = e.clientX - startX;
      const moveY = e.clientY - startY;
      if (!decided) {
        if (Math.abs(moveX) > 6 || Math.abs(moveY) > 6) {
          decided = true;
          isHorizontal = Math.abs(moveX) > Math.abs(moveY);
        } else return;
      }
      if (!isHorizontal) return; // 竖直手势留给页面滚动
      e.preventDefault();
      const next = Math.max(-ACTION_W, Math.min(0, openOffset + moveX));
      setX(next, false);
    });
    function finish(e) {
      if (!dragging) return;
      dragging = false;
      if (!isHorizontal) return;
      const moveX = (e.clientX ?? startX) - startX;
      const target = openOffset + moveX < -ACTION_W / 2 ? -ACTION_W : 0;
      openOffset = target;
      setX(target, true);
    }
    entry.addEventListener('pointerup', finish);
    entry.addEventListener('pointercancel', finish);

    entry.querySelector('.kebab').addEventListener('click', () => {
      openOffset = openOffset === 0 ? -ACTION_W : 0;
      setX(openOffset, true);
    });
  });

  // 点击其它卡片时，收起当前展开的滑动卡片。
  listEl.addEventListener('pointerdown', e => {
    const current = e.target.closest('.entry');
    listEl.querySelectorAll('.entry').forEach(el => {
      if (el !== current && el.style.transform && el.style.transform !== 'translateX(0px)') {
        el.style.transition = 'transform var(--t-fast)';
        el.style.transform = 'translateX(0px)';
      }
    });
  }, true);

  document.querySelectorAll('[data-theme-btn]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.documentElement.setAttribute('data-theme', btn.dataset.themeBtn);
      document.querySelectorAll('[data-theme-btn]').forEach(b => b.classList.toggle('active', b === btn));
    });
  });
})();
</script>
</body>
</html>
