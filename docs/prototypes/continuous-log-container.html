<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>连续日志容器 · 原型</title>
<!--
  时间尺 — 设计原型（非运行时文件，不进 sw.js 缓存）
  探索：把日视图从「离散卡片列表」改为「连续日志容器」。
  令牌与 .entry/.day-hero 结构照搬 styles.css v55；数据为通用假数据（隐私红线）。
-->
<style>
  /* ===== 结构令牌（照搬 styles.css v55，不随主题变） ===== */
  :root{
    --r-ctl:12px; --r-card:16px; --r-sheet:22px;
    --fs-cap:12px; --fs-ui:13px; --fs-body:15px;
    --t-fast:140ms ease-out; --control-h:44px;
  }
  /* ===== 暗·石墨（默认） ===== */
  html[data-theme="dark"]{
    --bg:#0e0f13; --card:#16171e; --input:#1d1f29;
    --border:rgba(255,255,255,0.09); --track:#262838;
    --accent:#a99fff; --accent-bg:rgba(139,124,255,0.14);
    --maintain:#63c894; --maintain-bg:rgba(70,168,120,0.14);
    --leak:#e19a59; --leak-bg:rgba(201,128,60,0.16);
    --text:#e8e9f1; --muted:#9fa1b8; --faint:#898ba2; --danger:#e0596b;
    --shadow-1:0 1px 2px rgba(0,0,0,0.40);
    --shadow-2:0 4px 16px rgba(0,0,0,0.35);
    --shadow-3:0 16px 48px rgba(0,0,0,0.50);
    --top-light:inset 0 1px 0 rgba(255,255,255,0.045);
  }
  /* ===== 亮·宣纸 ===== */
  html[data-theme="light"]{
    --bg:#f7f5f1; --card:#ffffff; --input:#f1efe9;
    --border:rgba(48,42,30,0.10); --track:#e4e1d9;
    --accent:#5745c7; --accent-bg:#efecfc;
    --maintain:#237a52; --maintain-bg:#e9f4ee;
    --leak:#9a4f1e; --leak-bg:#f8ede4;
    --text:#33323b; --muted:#686570; --faint:#77747f; --danger:#cf4d5e;
    --shadow-1:0 1px 2px rgba(48,42,30,0.06),0 2px 8px rgba(48,42,30,0.05);
    --shadow-2:0 2px 6px rgba(48,42,30,0.07),0 10px 28px rgba(48,42,30,0.08);
    --shadow-3:0 8px 20px rgba(48,42,30,0.10),0 28px 64px rgba(48,42,30,0.14);
    --top-light:none;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.5; padding:24px 16px 80px;
    transition:background var(--t-fast),color var(--t-fast);
  }

  /* ===== 原型外壳（非 app 的一部分） ===== */
  .proto-top{max-width:1240px;margin:0 auto 20px;display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;}
  .proto-top h1{font-size:19px;font-weight:700;}
  .proto-top p{font-size:var(--fs-ui);color:var(--muted);flex:1;min-width:220px;}
  .proto-toggle{
    font:inherit;font-size:var(--fs-ui);font-weight:600;color:var(--text);
    background:var(--card);border:1px solid var(--border);border-radius:999px;
    padding:8px 16px;cursor:pointer;box-shadow:var(--shadow-1);
  }
  .proto-toggle:active{transform:scale(0.97);}

  .frames{max-width:1240px;margin:0 auto;display:flex;gap:22px;flex-wrap:wrap;align-items:flex-start;justify-content:center;}
  .frame{flex:0 0 auto;width:380px;max-width:100%;}
  .frame-cap{font-size:var(--fs-cap);color:var(--faint);letter-spacing:.04em;text-transform:uppercase;margin:0 4px 8px;}
  .frame-note{font-size:var(--fs-ui);color:var(--muted);margin:12px 4px 0;}
  .frame-note b{color:var(--text);font-weight:600;}
  .frame-note .warn{color:var(--leak);}
  /* 手机取景框 */
  .phone{
    background:var(--bg); border:1px solid var(--border); border-radius:26px;
    box-shadow:var(--shadow-3); padding:16px 14px 22px; position:relative; overflow:hidden;
  }

  /* ===== hero 结论卡（照搬 .day-hero，作为上下文） ===== */
  .day-hero{display:flex;flex-direction:column;gap:10px;min-width:0;
    background:var(--card);border-radius:var(--r-card);padding:14px 16px;
    box-shadow:var(--shadow-2),var(--top-light);margin-bottom:14px;}
  .hero-nums{display:flex;align-items:flex-end;gap:24px;flex-wrap:wrap;}
  .hero-label{font-size:var(--fs-cap);color:var(--muted);margin-bottom:2px;}
  .hero-big{font-size:32px;font-weight:700;line-height:1.05;color:var(--text);font-variant-numeric:tabular-nums;}
  .hero-leak{font-size:19px;font-weight:650;line-height:1.1;color:var(--leak);font-variant-numeric:tabular-nums;}
  .hero-bar{height:6px;border-radius:3px;background:var(--border);display:flex;overflow:hidden;gap:2px;}
  .hero-bar div:first-child{border-radius:3px 0 0 3px;} .hero-bar div:last-child{border-radius:0 3px 3px 0;}
  .hero-aux{font-size:var(--fs-cap);color:var(--faint);font-variant-numeric:tabular-nums;}

  .tl-label{font-size:var(--fs-cap);color:var(--faint);letter-spacing:.04em;text-transform:uppercase;margin:0 2px 8px;}

  /* ===== 现状：离散卡片（照搬 .entry） ===== */
  .cards .entry{
    background:var(--card);border-radius:var(--r-card);padding:12px 14px;margin-bottom:6px;
    display:flex;gap:10px;border:1px solid transparent;box-shadow:none;
  }
  .cards .entry.gap{border-style:dashed;border-color:var(--border);background:transparent;}
  .cards .entry.planned{border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);
    background:color-mix(in srgb,var(--bg) 92%,var(--muted));}
  .e-body{flex:1;min-width:0;}
  .e-time{font-size:var(--fs-ui);color:var(--muted);font-variant-numeric:tabular-nums;margin-bottom:2px;}
  .e-what{font-size:var(--fs-body);color:var(--text);word-break:break-word;margin-bottom:5px;}
  .entry.gap .e-what,.entry.placeholder .e-what{color:var(--muted);}
  .e-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .e-tag{font-size:var(--fs-cap);padding:2px 9px;border-radius:8px;background:var(--accent-bg);color:var(--accent);}
  .e-tag-job{background:var(--accent-bg);color:var(--accent);}
  .e-tag-maintain{background:var(--maintain-bg);color:var(--maintain);}
  .e-tag-leak{background:var(--leak-bg);color:var(--leak);}
  .e-tag-unrecorded{background:var(--input);color:var(--muted);}
  .e-dur{font-size:var(--fs-cap);color:var(--muted);font-variant-numeric:tabular-nums;}

  /* ===== 变体 A：分组连续列（一个面容器 + 发丝分隔线 + 桶色边） ===== */
  .contlog{
    background:var(--card); border-radius:var(--r-card);
    box-shadow:var(--shadow-2),var(--top-light); overflow:hidden;
  }
  .cl-row{
    display:grid; grid-template-columns:52px 1fr auto; align-items:center; gap:10px;
    padding:11px 14px 11px 0; position:relative; cursor:pointer;
    border-top:1px solid var(--border);
  }
  .cl-row:first-child{border-top:0;}
  .cl-row:active{background:color-mix(in srgb,var(--accent) 8%,transparent);}
  /* 左侧桶色边：读列首色序 = 一天的形状（与 hero 横条同一故事，竖起来） */
  .cl-row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--rail,var(--track));}
  .cl-row[data-b="job"]{--rail:var(--accent);}
  .cl-row[data-b="maintain"]{--rail:var(--maintain);}
  .cl-row[data-b="leak"]{--rail:var(--leak);}
  .cl-row[data-b="unrecorded"]{--rail:var(--track);}
  .cl-time{font-size:var(--fs-ui);color:var(--muted);font-variant-numeric:tabular-nums;text-align:right;padding-left:12px;}
  .cl-mid{min-width:0;}
  .cl-what{font-size:var(--fs-body);color:var(--text);}
  .cl-row[data-b="unrecorded"] .cl-what{color:var(--muted);}
  .cl-tag{font-size:var(--fs-cap);color:var(--faint);margin-top:1px;}
  .cl-dur{font-size:var(--fs-cap);color:var(--muted);font-variant-numeric:tabular-nums;padding-right:14px;white-space:nowrap;}
  .cl-row.ongoing .cl-what{color:var(--text);}
  .cl-row.ongoing .cl-dur{color:var(--accent);}

  /* ===== 变体 B：比例时间脊（height ∝ 时长，clamp 保底/封顶） ===== */
  .spine{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow-2),var(--top-light);
    padding:6px 14px 6px 0;overflow:hidden;}
  .sp-row{display:grid;grid-template-columns:52px 1fr;gap:12px;position:relative;cursor:pointer;}
  .sp-gutter{position:relative;text-align:right;padding-left:8px;}
  .sp-tick{font-size:var(--fs-cap);color:var(--muted);font-variant-numeric:tabular-nums;position:absolute;right:8px;top:-7px;background:var(--card);padding:0 2px;}
  /* 脊线：连续的一竖条，颜色随桶；height 由行高撑开 = 时长比例 */
  .sp-bar{position:relative;}
  .sp-bar::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;border-radius:3px;
    background:var(--rail,var(--track));opacity:.9;}
  .sp-row[data-b="job"]{--rail:var(--accent);}
  .sp-row[data-b="maintain"]{--rail:var(--maintain);}
  .sp-row[data-b="leak"]{--rail:var(--leak);}
  .sp-row[data-b="unrecorded"]{--rail:var(--track);}
  .sp-row[data-b="unrecorded"] .sp-bar::before{background:repeating-linear-gradient(180deg,var(--track) 0 6px,transparent 6px 11px);}
  .sp-content{padding:8px 0 8px 18px;min-width:0;}
  .sp-what{font-size:var(--fs-body);color:var(--text);}
  .sp-row[data-b="unrecorded"] .sp-what{color:var(--muted);}
  .sp-meta{font-size:var(--fs-cap);color:var(--faint);font-variant-numeric:tabular-nums;margin-top:2px;}
  .sp-clip{font-size:var(--fs-cap);color:var(--faint);}
  .sp-row.ongoing .sp-bar::before{background:linear-gradient(180deg,var(--track),var(--accent));}

  /* ===== 变体 C：台账密排（连续时间沟 + 双色分隔的密行） ===== */
  .ledger{background:var(--card);border-radius:var(--r-card);box-shadow:var(--shadow-2),var(--top-light);overflow:hidden;}
  .lg-row{display:grid;grid-template-columns:44px 6px 1fr auto;align-items:baseline;gap:9px;
    padding:7px 12px 7px 10px;cursor:pointer;border-top:1px solid color-mix(in srgb,var(--border) 60%,transparent);}
  .lg-row:first-child{border-top:0;}
  .lg-row:active{background:color-mix(in srgb,var(--accent) 8%,transparent);}
  .lg-time{font-size:var(--fs-cap);color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:-.02em;}
  .lg-pip{align-self:stretch;border-radius:2px;background:var(--rail,var(--track));}
  .lg-row[data-b="job"]{--rail:var(--accent);}
  .lg-row[data-b="maintain"]{--rail:var(--maintain);}
  .lg-row[data-b="leak"]{--rail:var(--leak);}
  .lg-row[data-b="unrecorded"]{--rail:var(--track);}
  .lg-what{font-size:var(--fs-ui);color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lg-row[data-b="unrecorded"] .lg-what{color:var(--muted);}
  .lg-dur{font-size:var(--fs-cap);color:var(--faint);font-variant-numeric:tabular-nums;white-space:nowrap;}

  @media(max-width:820px){.frame{width:100%;max-width:420px;}}
</style>
</head>
<body>
  <div class="proto-top">
    <h1>连续日志容器</h1>
    <p>把日视图从「一堆浮起的卡片」（现状）改为「一整块连续的日志面」。核心动机：时间本身是连续的——每段的结束就是下段的开始——现状用卡片间距 + 各自阴影把它切成互不相干的方块，与事实相悖。三种容器化处理，同一份假数据。</p>
    <button class="proto-toggle" id="themeBtn">☾ 暗色 / 亮色</button>
  </div>

  <div class="frames" id="frames"></div>

<script>
// ---- 假数据（通用、无个人线索；一天从睡觉到进行中）----
// b = 桶；ongoing = 进行中占位；planned/gap 亦可标注
const NOW = "19:40";
const DAY = [
  {s:"00:00", e:"07:30", what:"睡觉",       tag:"睡觉",   b:"maintain", min:450, clip:true},
  {s:"07:30", e:"08:10", what:"洗漱早饭",   tag:"洗漱",   b:"maintain", min:40},
  {s:"08:10", e:"09:00", what:"通勤",       tag:"通勤",   b:"maintain", min:50},
  {s:"09:00", e:"10:45", what:"写代码",     tag:"主线",   b:"job",      min:105},
  {s:"10:45", e:"11:00", what:"刷手机",     tag:"刷手机", b:"leak",     min:15},
  {s:"11:00", e:"12:30", what:"写代码",     tag:"主线",   b:"job",      min:90},
  {s:"12:30", e:"13:15", what:"午饭",       tag:"吃饭",   b:"maintain", min:45},
  {s:"13:15", e:"13:40", what:"这一段还没记", tag:"未记录", b:"unrecorded", min:25, gap:true},
  {s:"13:40", e:"15:30", what:"开会",       tag:"主线",   b:"job",      min:110},
  {s:"15:30", e:"16:00", what:"刷手机",     tag:"刷手机", b:"leak",     min:30},
  {s:"16:00", e:"18:20", what:"写代码",     tag:"主线",   b:"job",      min:140},
  {s:"18:20", e:"19:00", what:"晚饭",       tag:"吃饭",   b:"maintain", min:40},
  {s:"19:00", e:NOW,     what:"进行中·还没记", tag:"未记录", b:"unrecorded", min:40, ongoing:true},
];

// fmtMins 照搬 src/time.js
function fmtMins(m){
  if(m<1) return "<1min";
  if(m<60) return "~"+Math.round(m)+"min";
  const h=Math.floor(m/60), r=Math.round(m%60);
  return r? "~"+h+"h"+r+"min" : "~"+h+"h";
}
// 桶合计（分钟权威）
const T={job:0,maintain:0,leak:0,unrecorded:0};
DAY.forEach(d=>{T[d.b]+=d.min;});
const total=T.job+T.maintain+T.leak+T.unrecorded;
const COLOR={job:"--accent",maintain:"--maintain",leak:"--leak",unrecorded:"--track"};

function heroHTML(){
  const seg=b=>`<div style="flex:${T[b]};background:var(${COLOR[b]})${b==='maintain'?';opacity:.55':''}"></div>`;
  return `<div class="day-hero">
    <div class="hero-nums">
      <div><div class="hero-label">今日主线</div><div class="hero-big">${fmtMins(T.job)}</div></div>
      <div><div class="hero-label">漏损</div><div class="hero-leak">${fmtMins(T.leak)}</div></div>
    </div>
    <div class="hero-bar">${['job','maintain','leak','unrecorded'].map(seg).join('')}</div>
    <div class="hero-aux">维持 ${fmtMins(T.maintain)} · 未记录 ${fmtMins(T.unrecorded)} · 截至 ${NOW}</div>
  </div>`;
}

// ---- 现状：离散卡片 ----
function cardsHTML(){
  const rows=[...DAY].reverse().map(d=>{
    const cls=d.gap?"entry gap":d.ongoing?"entry placeholder":"entry";
    const tagCls=d.b==="unrecorded"?"e-tag-unrecorded":"e-tag-"+d.b;
    const dur=d.ongoing?"未记录·进行中":d.gap?"未记录":fmtMins(d.min);
    return `<div class="${cls}"><div class="e-body">
      <div class="e-time">${d.s}</div>
      <div class="e-what">${d.what}</div>
      <div class="e-meta"><span class="e-tag ${tagCls}">#${d.tag}</span><span class="e-dur">${dur}</span></div>
    </div></div>`;
  }).join('');
  return `<div class="cards">${rows}</div>`;
}

// ---- 变体 A：分组连续列 ----
function contlogHTML(){
  const rows=[...DAY].reverse().map(d=>{
    const dur=d.ongoing?"进行中":d.gap?"—":fmtMins(d.min);
    return `<div class="cl-row${d.ongoing?' ongoing':''}" data-b="${d.b}">
      <div class="cl-time">${d.s}</div>
      <div class="cl-mid"><div class="cl-what">${d.what}</div><div class="cl-tag">#${d.tag}</div></div>
      <div class="cl-dur">${dur}</div>
    </div>`;
  }).join('');
  return `<div class="contlog">${rows}</div>`;
}

// ---- 变体 B：比例时间脊（height ∝ min，clamp 44–200）----
function spineHTML(){
  const SCALE=0.62, MIN=44, MAX=200;
  const rows=[...DAY].reverse().map(d=>{
    const h=Math.max(MIN,Math.min(MAX,Math.round(d.min*SCALE)));
    const clipped=d.min*SCALE>MAX;
    const dur=d.ongoing?"进行中 "+fmtMins(d.min):fmtMins(d.min);
    return `<div class="sp-row${d.ongoing?' ongoing':''}" data-b="${d.b}" style="min-height:${h}px">
      <div class="sp-gutter"><span class="sp-tick">${d.s}</span></div>
      <div class="sp-bar"><div class="sp-content">
        <div class="sp-what">${d.what}</div>
        <div class="sp-meta">#${d.tag} · ${dur}${clipped?' <span class="sp-clip">⋯压缩</span>':''}</div>
      </div></div>
    </div>`;
  }).join('');
  return `<div class="spine">${rows}
    <div class="sp-row"><div class="sp-gutter"><span class="sp-tick">${NOW}</span></div><div></div></div>
  </div>`;
}

// ---- 变体 C：台账密排 ----
function ledgerHTML(){
  const rows=[...DAY].reverse().map(d=>{
    const dur=d.ongoing?"进行中":d.gap?"未记录":fmtMins(d.min);
    return `<div class="lg-row" data-b="${d.b}">
      <div class="lg-time">${d.s}</div><div class="lg-pip"></div>
      <div class="lg-what">${d.what} <span style="color:var(--faint)">#${d.tag}</span></div>
      <div class="lg-dur">${dur}</div>
    </div>`;
  }).join('');
  return `<div class="ledger">${rows}</div>`;
}

const FRAMES=[
  {cap:"现状 · 离散卡片", body:cardsHTML(),
   note:`每条 = 独立卡片（<b>--card</b> 背景 + 圆角 + 间距）。13 条 = 13 个浮块，v55 记为「card soup」。时长不可比：15min 与 7h30 一样高。`},
  {cap:"A · 分组连续列", body:contlogHTML(),
   note:`一整块面，发丝线分隔，左侧 4px 桶色边。<b>竖读色序 = 一天的形状</b>，与 hero 横条同一故事、竖起来。最保守的「去 soup」，不动时长表达，风险最低。`},
  {cap:"B · 比例时间脊", body:spineHTML(),
   note:`行高 ∝ 时长（clamp 44–200，睡觉压缩标 ⋯）。<b>恢复现状丢失的时长可比性</b>。<span class="warn">注意：</span>v34/v35 试过比例 rail 已在 v36 回退——但那次退的是「拖把手直接操纵」的手感，不是只读容器；此处保持点行编辑。`},
  {cap:"C · 台账密排", body:ledgerHTML(),
   note:`最密：连续时间沟 + 2px 桶色 pip + 单行省略。一屏看全天，适合回看/校对，牺牲呼吸感。`},
];

function render(){
  document.getElementById('frames').innerHTML=FRAMES.map(f=>`
    <div class="frame">
      <div class="frame-cap">${f.cap}</div>
      <div class="phone">${heroHTML()}<div class="tl-label">时间轴</div>${f.body}</div>
      <div class="frame-note">${f.note}</div>
    </div>`).join('');
}
render();

document.getElementById('themeBtn').addEventListener('click',()=>{
  const h=document.documentElement;
  h.dataset.theme = h.dataset.theme==="dark" ? "light" : "dark";
});
</script>
</body>
</html>
